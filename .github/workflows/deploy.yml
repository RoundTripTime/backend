name: Build & Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build test DB image
        run: docker build -t roundtrip-postgres-test:latest ./docker/postgres

      - name: Build
        run: ./gradlew clean build -x test

      - name: Test
        run: ./gradlew test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: roundtrip-jar
          path: build/libs/roundtrip.jar
          retention-days: 3

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: roundtrip-jar
          path: ./artifact

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env on EC2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENVEOF'
          sudo tee /opt/roundtrip/.env > /dev/null << EOF
          SPRING_PROFILES_ACTIVE=prod
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          REDIS_PORT=${{ secrets.REDIS_PORT }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_ACCESS_EXPIRY_MS=${{ secrets.JWT_ACCESS_EXPIRY_MS }}
          JWT_REFRESH_EXPIRY_MS=${{ secrets.JWT_REFRESH_EXPIRY_MS }}
          KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          SUPADATA_API_KEY=${{ secrets.SUPADATA_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          KAKAO_LOCAL_API_KEY=${{ secrets.KAKAO_LOCAL_API_KEY }}
          APP_SHARE_BASE_URL=${{ secrets.APP_SHARE_BASE_URL }}
          GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}
          AWS_S3_ACCESS_KEY=${{ secrets.AWS_S3_ACCESS_KEY }}
          AWS_S3_SECRET_KEY=${{ secrets.AWS_S3_SECRET_KEY }}
          AWS_S3_REGION=${{ secrets.AWS_S3_REGION }}
          AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
          EOF
          ENVEOF

      - name: Deploy JAR and script to EC2
        run: |
          scp -i ~/.ssh/deploy_key ./artifact/roundtrip.jar ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/roundtrip-new.jar
          scp -i ~/.ssh/deploy_key ./scripts/deploy.sh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/deploy.sh
          scp -i ~/.ssh/deploy_key ./scripts/roundtrip.service ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/roundtrip.service
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'DEPLOYEOF'
          sudo mv /tmp/roundtrip-new.jar /opt/roundtrip/roundtrip-new.jar
          sudo mv /tmp/deploy.sh /opt/roundtrip/deploy.sh
          sudo chown roundtrip:roundtrip /opt/roundtrip/roundtrip-new.jar /opt/roundtrip/deploy.sh
          sudo chmod +x /opt/roundtrip/deploy.sh
          sudo mv /tmp/roundtrip.service /etc/systemd/system/roundtrip.service
          sudo systemctl daemon-reload
          sudo systemctl enable roundtrip
          DEPLOYEOF

      - name: Run deploy script
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'sudo bash /opt/roundtrip/deploy.sh'
