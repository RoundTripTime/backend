spring:
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:roundtrip}
    username: ${DB_USERNAME:roundtrip}
    password: ${DB_PASSWORD:roundtrip}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jackson:
    property-naming-strategy: SNAKE_CASE
    mapper:
      accept-case-insensitive-enums: true

jwt:
  secret: integration-test-secret-must-be-at-least-thirty-two-bytes-long-1234
  access-expiry-ms: 1800000
  refresh-expiry-ms: 1209600000

app:
  share-base-url: https://app.example.com/share/collections/

auth:
  social:
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      issuer: https://kauth.kakao.com
      jwks-uri: https://kauth.kakao.com/.well-known/jwks.json
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      issuer: https://accounts.google.com
      jwks-uri: https://www.googleapis.com/oauth2/v3/certs

supadata:
  api-key: ${SUPADATA_API_KEY:}
  base-url: https://api.supadata.ai/v1

featherlessai:
  api-key: ${FEATHERLESSAI_API_KEY:}
  model: Qwen/Qwen3-235B-A22B

kakao:
  local:
    api-key: ${KAKAO_REST_API_KEY:}
    base-url: https://dapi.kakao.com
