spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:roundtrip}
    username: ${DB_USERNAME:roundtrip}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    property-naming-strategy: SNAKE_CASE

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

jwt:
  secret: ${JWT_SECRET}
  access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:1800000}
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:1209600000}

auth:
  social:
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      issuer: https://kauth.kakao.com
      jwks-uri: https://kauth.kakao.com/.well-known/jwks.json
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      issuer: https://accounts.google.com
      jwks-uri: https://www.googleapis.com/oauth2/v3/certs
