spring:
  config:
    import: "optional:file:.env[.properties]"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:roundtrip}
    username: ${DB_USERNAME:roundtrip}
    password: ${DB_PASSWORD:roundtrip}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    property-naming-strategy: SNAKE_CASE
    mapper:
      accept-case-insensitive-enums: true

  task:
    execution:
      pool:
        core-size: 4
        max-size: 10

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

jwt:
  secret: ${JWT_SECRET}
  access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:1800000}
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:1209600000}

auth:
  social:
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      issuer: https://kauth.kakao.com
      jwks-uri: https://kauth.kakao.com/.well-known/jwks.json
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      issuer: https://accounts.google.com
      jwks-uri: https://www.googleapis.com/oauth2/v3/certs

supadata:
  api-key: ${SUPADATA_API_KEY:}
  base-url: https://api.supadata.ai/v1

featherlessai:
  api-key: ${FEATHERLESSAI_API_KEY:}
  model: Qwen/Qwen3-235B-A22B

kakao:
  local:
    api-key: ${KAKAO_REST_API_KEY:}
    base-url: https://dapi.kakao.com

aws:
  s3:
    access-key: ${AWS_S3_ACCESS_KEY:}
    secret-key: ${AWS_S3_SECRET_KEY:}
    region: ${AWS_S3_REGION:ap-northeast-2}
    bucket: ${AWS_S3_BUCKET:}

google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY:}
    base-url: https://places.googleapis.com

myrealtrip:
  api-key: ${MYREALTRIP_API_KEY:}
  base-url: https://partner-ext-api.myrealtrip.com

app:
  share-base-url: ${APP_SHARE_BASE_URL:https://app.example.com/share/collections/}

notification:
  review-reminder:
    delay-minutes: ${NOTIFICATION_REVIEW_REMINDER_DELAY_MINUTES:30}
    scan-interval-ms: ${NOTIFICATION_REVIEW_REMINDER_SCAN_INTERVAL_MS:300000}
