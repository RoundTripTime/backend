services:
  postgres:
    build: ./docker/postgres
    container_name: roundtrip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-roundtrip}
      POSTGRES_USER: ${DB_USERNAME:-roundtrip}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-roundtrip} -d ${DB_NAME:-roundtrip}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: roundtrip-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
